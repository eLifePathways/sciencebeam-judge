name: CI Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set tags
        id: set_tags
        run: |
          VERSION=""
          GIT_BRANCH=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          if [[ $VERSION =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            PYTHON_PACKAGE_VERSION="${VERSION}"
          else
            PYTHON_PACKAGE_VERSION=`./scripts/dev/get-test-pypi-version.sh ${GITHUB_SHA}`
          fi
          echo "PYTHON_PACKAGE_VERSION=${PYTHON_PACKAGE_VERSION}"
          echo "python_package_version=${PYTHON_PACKAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Linting
        run: make dev-lint

      - name: Unit tests
        run: make dev-pytest

      - name: Run evaluation
        run: make dev-test-run-evaluation

      - name: Install notebook dependencies
        run: uv sync --group notebook

      - name: Run evaluation and update notebooks
        run: make dev-test-evaluate-and-update-notebooks

      - name: Show determined Python package version
        run: echo "${{ steps.set_tags.outputs.python_package_version }}"

      - name: Set version
        run: uv version "${{ steps.set_tags.outputs.python_package_version }}"

      - name: Build dist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  testpypi-publish:
    # if: github.ref == 'refs/heads/main'
    needs: ["build-and-test"]
    name: Upload release to Test PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Download dists
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          password: ${{ secrets.TEST_PYPI_CREDENTIALS }}

  pypi-publish:
    if: startsWith(github.ref, 'refs/tags')
    needs: ["build-and-test"]
    name: Upload release to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Download dists
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_CREDENTIALS }}
